<body>

<!-- NAV -->
<nav class="nav">
  <a href="index.html" class="nav-logo">Szakorvos<span>.hu</span></a>
  <div class="nav-search-bar">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#9aa5c4" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input id="navSpec" type="text" placeholder="Szakterület, orvos, klinika…" onkeydown="if(event.key==='Enter')doSearch()">

  <div class="nav-search-bar" style="max-width:200px">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#9aa5c4" stroke-width="2" stroke-linecap="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>

    Vissza

</nav>

<div class="page-layout">

  <!-- FILTERS -->
  <aside class="filters">
    <div class="filter-head">
      <div class="filter-head-title">🎯 Szűrők</div>
      <button class="filter-reset-btn" onclick="resetFilters()">Törlés</button>
    </div>

    <div class="filter-group">
      <label class="filter-label">Értékelés</label>
      <div class="filter-chips">
        <button class="filter-chip" onclick="toggleChip(this,'rating','4.5')">4.5+ ★</button>
        <button class="filter-chip" onclick="toggleChip(this,'rating','4.0')">4.0+ ★</button>
        <button class="filter-chip" onclick="toggleChip(this,'rating','3.5')">3.5+ ★</button>
      </div>
    </div>

    <div class="filter-group">
      <label class="filter-label">Max konzultációs díj</label>
      <div class="filter-range-wrap">
        <input type="range" class="filter-range" id="filterPrice"
          min="0" max="60000" step="5000" value="60000"
          oninput="updateRangeVal(this);applyFilters()">
        <div class="filter-range-val">
          <span>0 Ft</span>
          <span id="filterPriceVal">60 000 Ft</span>
        </div>
      </div>
    </div>

    <div class="filter-group">
      <label class="filter-label">Tapasztalat</label>
      <div class="filter-chips">
        <button class="filter-chip" onclick="toggleChip(this,'exp','5')">5+ év</button>
        <button class="filter-chip" onclick="toggleChip(this,'exp','10')">10+ év</button>
        <button class="filter-chip" onclick="toggleChip(this,'exp','15')">15+ év</button>
        <button class="filter-chip" onclick="toggleChip(this,'exp','20')">20+ év</button>
      </div>
    </div>

    <div class="filter-group">
      <label class="filter-label">Nem</label>
      <div class="filter-chips">
        <button class="filter-chip" onclick="toggleChip(this,'gender','female')">👩 Nő</button>
        <button class="filter-chip" onclick="toggleChip(this,'gender','male')">👨 Férfi</button>
      </div>
    </div>

    <div class="filter-group">
      <label class="filter-label">Online foglalás</label>
      <div class="filter-chips">
        <button class="filter-chip" onclick="toggleChip(this,'online','yes')">✓ Elérhető</button>
      </div>
    </div>

    <div class="filter-group">
      <label class="filter-label">Biztosító</label>
      <div id="insuranceFilters">
        <label class="filter-option"><input type="checkbox" value="OEP / TAJ kártya" onchange="applyFilters()"> OEP / TAJ kártya</label>
        <label class="filter-option"><input type="checkbox" value="Magánfizető" onchange="applyFilters()"> Magánfizető</label>
        <label class="filter-option"><input type="checkbox" value="SIGNAL IDUNA" onchange="applyFilters()"> SIGNAL IDUNA</label>
        <label class="filter-option"><input type="checkbox" value="Generali" onchange="applyFilters()"> Generali</label>
        <label class="filter-option"><input type="checkbox" value="Allianz" onchange="applyFilters()"> Allianz</label>
        <label class="filter-option"><input type="checkbox" value="UNIQA" onchange="applyFilters()"> UNIQA</label>
      </div>
    </div>

    <div class="filter-group">
      <label class="filter-label">Elérhetőség</label>
      <div class="filter-chips">
        <button class="filter-chip" onclick="toggleChip(this,'avail','weekend')">Hétvége</button>
        <button class="filter-chip" onclick="toggleChip(this,'avail','evening')">Este is</button>
        <button class="filter-chip" onclick="toggleChip(this,'avail','today')">Ma szabad</button>
      </div>
    </div>

  </aside>

  <!-- RESULTS -->
  <main>
    <button class="mobile-filter-btn" onclick="openMobileFilters()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="11" y1="18" x2="13" y2="18"/></svg>
      Szűrők
    </button>
    <div class="view-toggle-bar">
      <button class="view-tab active" id="tabDoctors" onclick="switchView('doctors')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
        Orvosok
        <span class="view-tab-count" id="doctorCount">–</span>
      </button>
      <button class="view-tab" id="tabClinics" onclick="switchView('clinics')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Klinikák
        <span class="view-tab-count" id="clinicCount">–</span>
      </button>
    </div>

    <div class="active-tags" id="activeTags"></div>
    <div class="results-head">
      <div class="results-count" id="resultsCount">Betöltés…</div>
      <select class="sort-select" id="sortSelect" onchange="applyFilters()">
        <option value="rating">Legjobb értékelés</option>
        <option value="experience">Legtöbb tapasztalat</option>
        <option value="price_asc">Ár: alacsony → magas</option>
        <option value="price_desc">Ár: magas → alacsony</option>
      </select>
    </div>
    <div id="resultsList">
      <div class="skel"></div>
      <div class="skel"></div>
      <div class="skel"></div>
    </div>
  </main>
</div>

<script>
// ── Real doctor photos from randomuser.me ──
// We use seed-based URLs so they're deterministic per doctor index
const PHOTO_SEEDS_MALE = [
  'https://randomuser.me/api/portraits/men/32.jpg',
  'https://randomuser.me/api/portraits/men/41.jpg',
  'https://randomuser.me/api/portraits/men/55.jpg',
  'https://randomuser.me/api/portraits/men/22.jpg',
  'https://randomuser.me/api/portraits/men/68.jpg',
  'https://randomuser.me/api/portraits/men/77.jpg',
  'https://randomuser.me/api/portraits/men/15.jpg',
  'https://randomuser.me/api/portraits/men/90.jpg',
  'https://randomuser.me/api/portraits/men/44.jpg',
  'https://randomuser.me/api/portraits/men/63.jpg',
];
const PHOTO_SEEDS_FEMALE = [
  'https://randomuser.me/api/portraits/women/44.jpg',
  'https://randomuser.me/api/portraits/women/32.jpg',
  'https://randomuser.me/api/portraits/women/55.jpg',
  'https://randomuser.me/api/portraits/women/68.jpg',
  'https://randomuser.me/api/portraits/women/22.jpg',
  'https://randomuser.me/api/portraits/women/77.jpg',
  'https://randomuser.me/api/portraits/women/15.jpg',
  'https://randomuser.me/api/portraits/women/90.jpg',
  'https://randomuser.me/api/portraits/women/41.jpg',
  'https://randomuser.me/api/portraits/women/63.jpg',
];

function getPhoto(name, index) {
  const femaleNames = ['Anna','Éva','Mária','Katalin','Ildikó','Zsuzsa','Petra','Dóra','Edina','Krisztina','Eszter','Judit','Veronika','Réka','Mónika'];
  const isFemale = femaleNames.some(fn => name.includes(fn));
  const pool = isFemale ? PHOTO_SEEDS_FEMALE : PHOTO_SEEDS_MALE;
  return pool[index % pool.length];
}

const DAYS = ['V','H','K','Sze','Cs','P','Szo'];
const params = new URLSearchParams(window.location.search);
let currentSpec = params.get('specialty') || '';
let currentCity = params.get('city') || '';
let allDoctors = [];

document.getElementById('navSpec').value = currentSpec;
document.getElementById('navCity').value = currentCity;

async function loadDoctors() {
  document.getElementById('resultsList').innerHTML = '<div class="skel"></div><div class="skel"></div><div class="skel"></div>';

  let query = db.from('doctors').select(`
    id, name, title, bio, rating, review_count, experience_years,
    doctor_specialties!inner(specialties!inner(name, slug)),
    doctor_clinics!inner(consultation_fee, clinics!inner(name, address, cities!inner(name))),
    doctor_insurances(insurance_types(name)),
    availability(day_of_week)
  `).eq('is_active', true);

  if (currentSpec) query = query.ilike('doctor_specialties.specialties.name', `%${currentSpec}%`);
  if (currentCity) query = query.ilike('doctor_clinics.clinics.cities.name', `%${currentCity}%`);

  let clinicQuery = db.from('clinics').select(`id, name, address, phone, cities(name), doctor_clinics(doctor_id, doctors(doctor_specialties(specialties(name))))`);
  if (currentCity) clinicQuery = clinicQuery.ilike('cities.name', `%${currentCity}%`);

  const [{ data, error }, { data: clinicData }] = await Promise.all([query, clinicQuery]);

  if (error) {
    document.getElementById('resultsList').innerHTML = `<div class="empty-state"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><h3>Hiba történt</h3><p>Kérjük próbálja újra.</p></div>`;
    return;
  }

  allDoctors = data || [];

  allClinics = (clinicData || []).filter(c => {
    if (!currentSpec) return true;
    return (c.doctor_clinics || []).some(dc =>
      (dc.doctors?.doctor_specialties || []).some(ds =>
        ds.specialties?.name?.toLowerCase().includes(currentSpec.toLowerCase())
      )
    );
  }).map(c => ({ ...c, doctorCount: (c.doctor_clinics || []).length }));

  updateTabCounts(allDoctors.length, allClinics.length);
  applyFilters();
}

let currentView = 'doctors'; // 'doctors' | 'clinics'
let allClinics = [];

function switchView(view) {
  currentView = view;
  document.getElementById('tabDoctors').classList.toggle('active', view === 'doctors');
  document.getElementById('tabClinics').classList.toggle('active', view === 'clinics');
  document.getElementById('sortSelect').style.display = view === 'doctors' ? '' : 'none';
  visibleCount = 10;
  if (view === 'clinics') {
    renderClinics(allClinics, visibleCount);
  } else {
    renderResults(window._filteredDocs || [], visibleCount);
  }
  renderActiveTags();
}

function updateTabCounts(doctors, clinics) {
  document.getElementById('doctorCount').textContent = doctors;
  document.getElementById('clinicCount').textContent = clinics;
}

function renderClinics(clinics, limit) {
  const count = document.getElementById('resultsCount');
  const list = document.getElementById('resultsList');
  const total = clinics.length;
  const shown = Math.min(limit, total);

  count.innerHTML = `<span>${total}</span> klinika találva`;

  if (!total) {
    list.innerHTML = `<div class="empty-state"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg><h3>Nem találtunk klinikát</h3><p>Próbáljon más szakterületre keresni.</p></div>`;
    return;
  }

  const cards = clinics.slice(0, shown).map((c, i) => `
    <div class="clinic-card" style="animation-delay:${(i%10)*0.05}s">
      <div class="clinic-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#283897" stroke-width="1.8"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      </div>
      <div class="clinic-info">
        <div class="clinic-name">${c.name}</div>
        <div class="clinic-meta">
          ${c.cities?.name ? `<span class="clinic-meta-item"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>${c.cities.name}</span>` : ''}
          ${c.address ? `<span class="clinic-meta-item"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>${c.address}</span>` : ''}
          ${c.phone ? `<span class="clinic-meta-item"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2A19.79 19.79 0 0 1 11.61 19a19.5 19.5 0 0 1-6-6A19.79 19.79 0 0 1 3.09 4.18 2 2 0 0 1 5.08 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L9.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>${c.phone}</span>` : ''}
        </div>
        <div class="clinic-doctors-count">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
          ${c.doctorCount} orvos elérhető
        </div>
      </div>
      <div class="clinic-actions">
        <button class="btn-book" onclick="alert('${c.name}')">Klinika megtekintése</button>
        <button class="btn-profile">Orvosok listája</button>
      </div>
    </div>`).join('');

  const hasMore = shown < total;
  const loadMoreHtml = hasMore
    ? `<div class="load-more-wrap"><div class="load-more-info">Megjelenítve <strong>${shown}</strong> / <strong>${total}</strong> klinika</div><button class="load-more-btn" onclick="loadMore()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12l7 7 7-7"/></svg>Következő ${Math.min(10, total-shown)} klinika</button></div>`
    : `<div class="load-more-wrap"><div class="load-more-info">Minden klinika megjelenítve (<strong>${total}</strong> db)</div></div>`;

  list.innerHTML = cards + loadMoreHtml;
}

// Override loadMore to handle both views
function loadMore() {
  visibleCount += 10;
  if (currentView === 'clinics') renderClinics(allClinics, visibleCount);
  else renderResults(window._filteredDocs || [], visibleCount);
  renderActiveTags();
}

function applyFilters() {
  visibleCount = 10; // reset on filter change
  let docs = [...allDoctors];

  if (filterState.rating) docs = docs.filter(d => parseFloat(d.rating) >= parseFloat(filterState.rating));
  if (filterState.exp) docs = docs.filter(d => (d.experience_years || 0) >= parseInt(filterState.exp));

  const maxPrice = parseInt(document.getElementById('filterPrice')?.value || 60000);
  if (maxPrice < 60000) docs = docs.filter(d => { const fee = getFee(d); return !fee || fee <= maxPrice; });

  const checkedIns = [...document.querySelectorAll('#insuranceFilters input:checked')].map(i => i.value);
  if (checkedIns.length) {
    docs = docs.filter(d => {
      const ins = (d.doctor_insurances || []).map(i => i.insurance_types?.name);
      return checkedIns.some(ci => ins.includes(ci));
    });
  }

  if (filterState.avail === 'weekend') docs = docs.filter(d => (d.availability || []).some(a => a.day_of_week === 0 || a.day_of_week === 6));
  if (filterState.avail === 'today') docs = docs.filter(d => (d.availability || []).some(a => a.day_of_week === new Date().getDay()));

  const sort = document.getElementById('sortSelect').value;
  if (sort === 'rating') docs.sort((a,b) => (b.rating||0) - (a.rating||0));
  else if (sort === 'experience') docs.sort((a,b) => (b.experience_years||0) - (a.experience_years||0));
  else if (sort === 'price_asc') docs.sort((a,b) => getFee(a) - getFee(b));
  else if (sort === 'price_desc') docs.sort((a,b) => getFee(b) - getFee(a));

  window._filteredDocs = docs;
  if (currentView === 'doctors') {
    renderResults(docs, visibleCount);
  }
  renderActiveTags();
}

function toggleChip(el, key, val) {
  if (filterState[key] === val) {
    filterState[key] = null;
    el.classList.remove('active');
  } else {
    // Deactivate other chips in same group
    document.querySelectorAll(`[onclick*="'${key}'"]`).forEach(c => c.classList.remove('active'));
    filterState[key] = val;
    el.classList.add('active');
  }
  applyFilters();
}

function updateRangeVal(el) {
  const v = parseInt(el.value);
  document.getElementById('filterPriceVal').textContent = v.toLocaleString('hu-HU') + ' Ft';
  const pct = ((v - el.min) / (el.max - el.min)) * 100;
  el.style.setProperty('--pct', pct + '%');
}

// Init range
window.addEventListener('DOMContentLoaded', () => {
  const r = document.getElementById('filterPrice');
  if (r) updateRangeVal(r);
});

function applyFilters() {
  let docs = [...allDoctors];

  // Rating
  if (filterState.rating) docs = docs.filter(d => parseFloat(d.rating) >= parseFloat(filterState.rating));

  // Experience
  if (filterState.exp) docs = docs.filter(d => (d.experience_years || 0) >= parseInt(filterState.exp));

  // Price range
  const maxPrice = parseInt(document.getElementById('filterPrice')?.value || 60000);
  if (maxPrice < 60000) docs = docs.filter(d => {
    const fee = getFee(d);
    return !fee || fee <= maxPrice;
  });

  // Insurance
  const checkedIns = [...document.querySelectorAll('#insuranceFilters input:checked')].map(i => i.value);
  if (checkedIns.length) {
    docs = docs.filter(d => {
      const ins = (d.doctor_insurances || []).map(i => i.insurance_types?.name);
      return checkedIns.some(ci => ins.includes(ci));
    });
  }

  // Availability
  if (filterState.avail === 'weekend') docs = docs.filter(d => (d.availability || []).some(a => a.day_of_week === 0 || a.day_of_week === 6));
  if (filterState.avail === 'today') docs = docs.filter(d => (d.availability || []).some(a => a.day_of_week === new Date().getDay()));

  const sort = document.getElementById('sortSelect').value;
  if (sort === 'rating') docs.sort((a,b) => (b.rating||0) - (a.rating||0));
  else if (sort === 'experience') docs.sort((a,b) => (b.experience_years||0) - (a.experience_years||0));
  else if (sort === 'price_asc') docs.sort((a,b) => getFee(a) - getFee(b));
  else if (sort === 'price_desc') docs.sort((a,b) => getFee(b) - getFee(a));

  renderResults(docs);
  renderActiveTags();
}

function getFee(d) { return d.doctor_clinics?.[0]?.consultation_fee || 0; }

function starsHtml(rating) {
  const r = Math.round(rating || 0);
  return '★'.repeat(r) + '☆'.repeat(5 - r);
}

function renderResults(docs, limit) {
  const count = document.getElementById('resultsCount');
  const list = document.getElementById('resultsList');
  const total = docs.length;
  const shown = Math.min(limit, total);

  count.innerHTML = `<span>${total}</span> orvos találva`;

  if (!docs.length) {
    list.innerHTML = `<div class="empty-state">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <h3>Nem találtunk orvost</h3>
      <p>Próbáljon más városra vagy szakterületre keresni.</p>
    </div>`;
    return;
  }

  const cards = docs.slice(0, shown).map((d, i) => {
    const spec = d.doctor_specialties?.[0]?.specialties?.name || '';
    const clinic = d.doctor_clinics?.[0]?.clinics;
    const city = clinic?.cities?.name || '';
    const fee = getFee(d);
    const avDays = (d.availability || []).map(a => a.day_of_week);
    const photoUrl = getPhoto(d.name, i);
    const initials = d.name.replace('Dr. ','').split(' ').map(w=>w[0]).join('').slice(0,2);
    const hasIns = (d.doctor_insurances || []).length > 0;

    return `<div class="doc-card" style="animation-delay:${(i%10)*0.05}s">
      <div class="doc-photo-col">
        <img class="doc-photo" src="${photoUrl}" alt="${d.name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
        <div class="doc-photo-placeholder" style="display:none">${initials}</div>
        ${avDays.length > 0 ? `<div class="doc-available-badge"><div class="doc-available-dot"></div>Szabad időpont</div>` : ''}
      </div>
      <div class="doc-info-col">
        <div class="doc-top">
          <div>
            <div class="doc-name">${d.name}</div>
            ${d.title ? `<div class="doc-title-tag">${d.title}</div>` : ''}
          </div>
        </div>
        ${spec ? `<div class="doc-specialty">${spec}</div>` : ''}
        <div class="doc-meta">
          ${city ? `<span class="doc-meta-item"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>${city}</span>` : ''}
          ${clinic?.name ? `<span class="doc-meta-item"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>${clinic.name}</span>` : ''}
          ${d.experience_years ? `<span class="doc-meta-item"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>${d.experience_years} év tapasztalat</span>` : ''}
        </div>
        <div class="doc-rating-row">
          <span class="doc-stars">${starsHtml(d.rating)}</span>
          <span class="doc-rating-num">${d.rating ? parseFloat(d.rating).toFixed(1) : '–'}</span>
          <span class="doc-rating-count">(${d.review_count || 0} értékelés)</span>
        </div>
        ${d.bio ? `<div class="doc-bio">${d.bio}</div>` : ''}
        <div class="doc-avail-row">
          ${DAYS.map((day, idx) => `<div class="avail-day ${avDays.includes(idx+1) ? 'free' : ''}" title="${day}">${day}</div>`).join('')}
        </div>
      </div>
      <div class="doc-action-col">
        <div class="doc-price-wrap">
          <div class="doc-price">${fee ? fee.toLocaleString('hu-HU') + ' Ft' : 'Egyedi'}</div>
          <div class="doc-price-label">konzultációs díj</div>
          ${hasIns ? `<div class="doc-insurance">✓ Biztosító elfogadva</div>` : ''}
        </div>
        <div style="display:flex;flex-direction:column;gap:8px;width:100%">
          <button class="btn-book" onclick="bookDoctor('${d.id}','${d.name.replace(/'/g,"\\'")}')">Időpontot foglalok</button>
          <button class="btn-profile">Profil megtekintése</button>
        </div>
      </div>
    </div>`;
  }).join('');

  // Load more button
  const hasMore = shown < total;
  const loadMore = hasMore ? `
    <div class="load-more-wrap">
      <div class="load-more-info">Megjelenítve <strong>${shown}</strong> / <strong>${total}</strong> találat</div>
      <button class="load-more-btn" onclick="loadMore()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12l7 7 7-7"/></svg>
        Következő ${Math.min(10, total - shown)} találat betöltése
      </button>
    </div>` : `<div class="load-more-wrap"><div class="load-more-info">Minden találat megjelenítve (<strong>${total}</strong> db)</div></div>`;

  list.innerHTML = cards + loadMore;
}

function loadMore() {
  visibleCount += 10;
  renderResults(window._filteredDocs || [], visibleCount);
  renderActiveTags();
}

function renderActiveTags() {
  const tags = [];
  if (currentSpec) tags.push({ label: currentSpec, clear: () => { currentSpec=''; document.getElementById('navSpec').value=''; loadDoctors(); }});
  if (currentCity) tags.push({ label: currentCity, clear: () => { currentCity=''; document.getElementById('navCity').value=''; loadDoctors(); }});
  if (filterState.rating) tags.push({ label: filterState.rating + '★ felett', clear: () => { filterState.rating=null; document.querySelectorAll('[onclick*="\'rating\'"]').forEach(c=>c.classList.remove('active')); applyFilters(); }});

  const container = document.getElementById('activeTags');
  container.innerHTML = tags.map((t,i) => `<div class="active-tag">${t.label} <button onclick="clearTag(${i})">×</button></div>`).join('');
  window._tagClears = tags.map(t => t.clear);
}

function clearTag(i) { window._tagClears[i](); }

function doSearch() {
  currentSpec = document.getElementById('navSpec').value.trim();
  currentCity = document.getElementById('navCity').value.trim();
  const p = new URLSearchParams();
  if (currentSpec) p.set('specialty', currentSpec);
  if (currentCity) p.set('city', currentCity);
  window.history.replaceState({}, '', '?' + p.toString());
  loadDoctors();
}

function resetFilters() {
  Object.keys(filterState).forEach(k => filterState[k] = null);
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  document.querySelectorAll('#insuranceFilters input').forEach(i => i.checked = false);
  const r = document.getElementById('filterPrice');
  if (r) { r.value = 60000; updateRangeVal(r); }
  applyFilters();
}

function bookDoctor(id, name) {
  alert('Időpontfoglalás: ' + name + '\n(Ez a funkció hamarosan elérhető lesz!)');
}


function openMobileFilters() {
  document.getElementById('mobileFilterOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeMobileFilters() {
  document.getElementById('mobileFilterOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

loadDoctors();
</script>

<!-- Mobile filter overlay -->
<div class="mobile-filter-overlay" id="mobileFilterOverlay" onclick="if(event.target===this)closeMobileFilters()">
  <div class="mobile-filter-panel">
    <div class="mobile-filter-handle"></div>
    <div class="filter-head">
      <div class="filter-head-title">🎯 Szűrők</div>
      <button class="filter-reset-btn" onclick="resetFilters()">Törlés</button>
    </div>
    <div class="filter-group">
      <label class="filter-label">Értékelés</label>
      <div class="filter-chips">
        <button class="filter-chip" onclick="toggleChip(this,'rating','4.5')">4.5+ ★</button>
        <button class="filter-chip" onclick="toggleChip(this,'rating','4.0')">4.0+ ★</button>
        <button class="filter-chip" onclick="toggleChip(this,'rating','3.5')">3.5+ ★</button>
      </div>
    </div>
    <div class="filter-group">
      <label class="filter-label">Max ár</label>
      <div class="filter-range-wrap">
        <input type="range" class="filter-range" id="filterPriceMobile"
          min="0" max="60000" step="5000" value="60000"
          oninput="document.getElementById('filterPrice').value=this.value;updateRangeVal(this);document.getElementById('filterPriceMobileVal').textContent=parseInt(this.value).toLocaleString('hu-HU')+' Ft';applyFilters()">
        <div class="filter-range-val">
          <span>0 Ft</span>
          <span id="filterPriceMobileVal">60 000 Ft</span>
        </div>
      </div>
    </div>
    <div class="filter-group">
      <label class="filter-label">Tapasztalat</label>
      <div class="filter-chips">
        <button class="filter-chip" onclick="toggleChip(this,'exp','5')">5+ év</button>
        <button class="filter-chip" onclick="toggleChip(this,'exp','10')">10+ év</button>
        <button class="filter-chip" onclick="toggleChip(this,'exp','15')">15+ év</button>
      </div>
    </div>
    <div class="filter-group">
      <label class="filter-label">Elérhetőség</label>
      <div class="filter-chips">
        <button class="filter-chip" onclick="toggleChip(this,'avail','weekend')">Hétvége</button>
        <button class="filter-chip" onclick="toggleChip(this,'avail','today')">Ma szabad</button>
      </div>
    </div>
    <button class="btn-book" style="width:100%;margin-top:1rem" onclick="closeMobileFilters()">Szűrők alkalmazása</button>
  </div>
</div>

</body>
</html>
