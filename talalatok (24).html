<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Orvos keresési találatok | Szakorvos.hu</title>
  <meta name="description" content="Keresési találatok szakorvosokra. Szűrj szakterület, helyszín és ár szerint, foglalj időpontot online.">
  <meta name="robots" content="noindex, follow">
  <meta property="og:title" content="Szakorvos keresési találatok | Szakorvos.hu">
  <meta property="og:description" content="Találd meg a legjobb szakorvost. Szűrj és foglalj időpontot online.">
  <meta property="og:type" content="website">
  <meta name="author" content="Szakorvos.hu">
  <script>
    window.addEventListener('pageshow', function(e) {
      if (e.persisted) window.location.reload();
    });
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Nunito+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --brand: #283897; --orange: #ff6b2b; --green: #22c55e;
      --text: #0f172a; --muted: #6b7280; --border: #e8edf8; --bg: #f4f7fb;
    }
    body { font-family: 'Nunito Sans', sans-serif; background: var(--bg); color: var(--text); }

    /* NAV */
    nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(255,255,255,0.97);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      height: 64px; display: flex; align-items: center;
      padding: 0 4%; gap: 1rem;
    }
    .nav-logo { display: flex; align-items: center; gap: 8px; text-decoration: none; font-family: 'Nunito', sans-serif; font-size: 20px; font-weight: 800; color: var(--brand); }
    .nav-logo span { color: var(--green); }
    .nav-search-wrap {
      flex: 1; max-width: 480px; display: flex; align-items: center;
      background: #f4f7fb; border: 1.5px solid var(--border);
      border-radius: 100px; padding: 8px 8px 8px 16px; gap: 8px;
    }
    .nav-search-wrap input { flex: 1; border: none; background: transparent; font-size: 14px; color: var(--text); outline: none; font-family: 'Nunito Sans', sans-serif; }
    .nav-search-wrap input::placeholder { color: #b0bcd4; }
    .nav-search-btn {
      background: var(--brand); color: #fff; border: none; border-radius: 100px;
      padding: 7px 16px; font-size: 13px; font-weight: 700; font-family: 'Nunito', sans-serif;
      cursor: pointer; white-space: nowrap; transition: background 0.2s;
    }
    .nav-search-btn:hover { background: #1e2d7d; }
    .nav-back { margin-left: auto; display: flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 600; color: var(--brand); text-decoration: none; padding: 7px 14px; border: 1.5px solid var(--border); border-radius: 8px; transition: all 0.2s; white-space: nowrap; }
    .nav-back:hover { background: var(--brand); color: #fff; border-color: var(--brand); }

    /* LAYOUT */
    .page-wrap { max-width: 1100px; margin: 0 auto; padding: 2rem 4%; display: grid; grid-template-columns: 260px 1fr; gap: 1.5rem; }

    /* SIDEBAR FILTERS */
    .filters { position: sticky; top: 80px; align-self: start; }
    .filter-card { background: #fff; border: 1.5px solid var(--border); border-radius: 16px; padding: 1.25rem; box-shadow: 0 2px 8px rgba(40,56,151,0.05); margin-bottom: 1rem; }
    .filter-title { font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 800; color: var(--text); margin-bottom: 0.75rem; }
    .filter-option { display: flex; align-items: center; gap: 8px; padding: 6px 0; cursor: pointer; }
    .filter-option input[type=checkbox] { accent-color: var(--brand); width: 15px; height: 15px; cursor: pointer; }
    .filter-option label { font-size: 13px; color: #374151; cursor: pointer; flex: 1; }
    .filter-option .filter-count { font-size: 11px; color: var(--muted); background: #f0f4fb; padding: 2px 7px; border-radius: 100px; }
    .filter-range { width: 100%; accent-color: var(--brand); margin-top: 8px; }
    .filter-range-labels { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); margin-top: 4px; }

    /* RESULTS */
    .results-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; flex-wrap: wrap; gap: 8px; }
    .results-count { font-size: 14px; color: var(--muted); }
    .results-count strong { color: var(--text); font-weight: 800; }
    .sort-select { font-size: 13px; font-family: 'Nunito Sans', sans-serif; color: var(--text); border: 1.5px solid var(--border); border-radius: 8px; padding: 6px 12px; background: #fff; cursor: pointer; outline: none; }

    /* DOCTOR CARD */
    .doctor-card {
      background: #fff;
      border: 1.5px solid var(--border);
      border-radius: 18px;
      padding: 1.25rem;
      display: flex; gap: 1rem;
      box-shadow: 0 2px 10px rgba(40,56,151,0.05);
      margin-bottom: 1rem;
      text-decoration: none; color: inherit;
      transition: all 0.22s;
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }
    .doctor-card::before {
      content: '';
      position: absolute; left: 0; top: 0; bottom: 0;
      width: 3px; background: transparent;
      transition: background 0.2s;
    }
    .doctor-card:hover {
      border-color: var(--brand);
      box-shadow: 0 8px 28px rgba(40,56,151,0.12);
      transform: translateY(-2px);
    }
    .doctor-card:hover::before { background: var(--brand); }
    .doctor-avatar {
      width: 72px; height: 72px; border-radius: 16px;
      background: #eef2ff; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; border: 2px solid var(--border);
    }
    .doctor-avatar svg { width: 36px; height: 36px; }
    .doctor-info { flex: 1; min-width: 0; }
    .doctor-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 4px; }
    .doctor-name { font-family: 'Nunito', sans-serif; font-size: 16px; font-weight: 800; color: var(--text); }
    .doctor-card:hover .doctor-name { color: var(--brand); }
    .doctor-spec { font-size: 13px; color: var(--muted); font-weight: 600; margin-bottom: 6px; }
    .doctor-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 8px; }
    .doctor-tag { background: #eef2ff; color: var(--brand); font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 100px; border: 1px solid #c7d2f0; }
    .doctor-meta { display: flex; flex-wrap: wrap; gap: 12px; }
    .doctor-meta-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--muted); }
    .doctor-meta-item svg { width: 13px; height: 13px; flex-shrink: 0; }
    .doctor-right { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; flex-shrink: 0; }
    .doctor-stars { color: #fbbf24; font-size: 13px; letter-spacing: 1px; }
    .doctor-rating-num { font-family: 'Nunito', sans-serif; font-size: 15px; font-weight: 800; color: var(--text); }
    .doctor-reviews { font-size: 11px; color: var(--muted); }
    .doctor-price { font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 800; color: var(--orange); }
    .doctor-price-label { font-size: 11px; color: var(--muted); text-align: right; }
    .btn-book-sm {
      background: var(--brand); color: #fff;
      font-family: 'Nunito', sans-serif; font-size: 12px; font-weight: 700;
      padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer;
      white-space: nowrap; transition: all 0.2s; margin-top: auto;
    }
    .btn-book-sm:hover { background: #1e2d7d; }
    .badge-available { display: inline-flex; align-items: center; gap: 4px; background: #ecfdf5; color: #16a34a; font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 100px; border: 1px solid #bbf7d0; }
    .badge-available::before { content: '●'; font-size: 7px; }

    /* PAGINATION */
    .pagination { display: flex; justify-content: center; gap: 8px; margin-top: 1.5rem; }
    .page-btn { width: 36px; height: 36px; border-radius: 9px; border: 1.5px solid var(--border); background: #fff; font-size: 13px; font-weight: 700; color: var(--muted); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
    .page-btn:hover { border-color: var(--brand); color: var(--brand); }
    .page-btn.active { background: var(--brand); border-color: var(--brand); color: #fff; }

    /* MOBILE */
    @media (max-width: 900px) {
      .page-wrap { grid-template-columns: 1fr; }
      .filters { position: static; }
      .filter-card { display: none; }
      .filter-card.show { display: block; }
      .mobile-filter-btn { display: flex !important; }
    }
    @media (max-width: 640px) {
      .doctor-card { flex-direction: column; }
      .doctor-right { flex-direction: row; align-items: center; flex-wrap: wrap; }
      .nav-search-wrap { max-width: none; flex: 1; }
      .nav-back { display: none; }
    }

    /* Animáció */
    .doctor-card { animation: fadeUp 0.3s ease both; }
    .doctor-card:nth-child(2) { animation-delay: 0.05s; }
    .doctor-card:nth-child(3) { animation-delay: 0.1s; }
    .doctor-card:nth-child(4) { animation-delay: 0.15s; }
    .doctor-card:nth-child(5) { animation-delay: 0.2s; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">Szakorvos<span>.hu</span></a>
  <div class="nav-search-wrap">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#b0bcd4" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="searchInput" placeholder="Orvos, szakterület, vizsgálat…">
    <button class="nav-search-btn" onclick="doSearch()">Keresés</button>
  </div>
  <a href="index.html" class="nav-back">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    Főoldal
  </a>
</nav>

<div class="page-wrap" id="pageWrap">

  <!-- SZŰRŐK -->
  <aside class="filters">
    <div class="filter-card">
      <div class="filter-title">Szűrők</div>
      <div class="filter-option"><input type="checkbox" id="f1" checked><label for="f1">Elérhető időpont</label><span class="filter-count">34</span></div>
      <div class="filter-option"><input type="checkbox" id="f2"><label for="f2">TB finanszírozott</label><span class="filter-count">18</span></div>
      <div class="filter-option"><input type="checkbox" id="f3"><label for="f3">Online konzultáció</label><span class="filter-count">12</span></div>
      <div class="filter-option"><input type="checkbox" id="f4"><label for="f4">4.5+ csillag</label><span class="filter-count">28</span></div>
    </div>
    <div class="filter-card">
      <div class="filter-title">Helyszín</div>
      <div class="filter-option"><input type="checkbox" id="c1" checked><label for="c1">Budapest</label><span class="filter-count">22</span></div>
      <div class="filter-option"><input type="checkbox" id="c2"><label for="c2">Debrecen</label><span class="filter-count">8</span></div>
      <div class="filter-option"><input type="checkbox" id="c3"><label for="c3">Győr</label><span class="filter-count">5</span></div>
      <div class="filter-option"><input type="checkbox" id="c4"><label for="c4">Pécs</label><span class="filter-count">4</span></div>
      <div class="filter-option"><input type="checkbox" id="c5"><label for="c5">Szeged</label><span class="filter-count">6</span></div>
    </div>
    <div class="filter-card">
      <div class="filter-title">Ár (Ft)</div>
      <input type="range" class="filter-range" min="5000" max="80000" value="50000" oninput="document.getElementById('priceVal').textContent=Number(this.value).toLocaleString('hu')">
      <div class="filter-range-labels"><span>5 000</span><span>max: <strong id="priceVal">50 000</strong> Ft</span></div>
    </div>
  </aside>

  <!-- TALÁLATOK -->
  <div class="results-col">
    <div class="results-header">
      <div class="results-count">Találatok: <strong id="resultCount">47</strong> kardiológus</div>
      <select class="sort-select">
        <option>Legjobb értékelés</option>
        <option>Legolcsóbb</option>
        <option>Legközelebb elérhető</option>
        <option>Legközelebbi helyszín</option>
      </select>
    </div>

    <!-- ORVOS KÁRTYÁK — dinamikusan töltve -->
    <div id="doctorList">
      <div id="loadingState" style="text-align:center;padding:3rem;color:#9aa5c4;">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="animation:spin 1s linear infinite;display:inline-block;"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
        <div style="margin-top:12px;font-size:14px;">Orvosok betöltése...</div>
      </div>
    </div>

    <div class="pagination" id="pagination" style="display:none;">
      <button class="page-btn active">1</button>
      <button class="page-btn">2</button>
      <button class="page-btn">3</button>
      <button class="page-btn">›</button>
    </div>
  </div>

</div>

<!-- ORVOS ADATLAP NÉZET (hash router) -->
<div id="doctorView" style="display:none;max-width:1000px;margin:2rem auto;padding:0 4%;">
  <button onclick="showList()" style="display:flex;align-items:center;gap:8px;background:#fff;border:1.5px solid #e8edf8;border-radius:10px;padding:9px 16px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;color:#283897;cursor:pointer;margin-bottom:1.5rem;">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    Vissza a találatokhoz
  </button>
  <div id="doctorProfileContent">
    <div style="text-align:center;padding:4rem;color:#9aa5c4;">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="animation:spin 1s linear infinite;display:block;margin:0 auto 12px"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
      Betöltés...
    </div>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://asgnkjmwzhbczpvetprh.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFzZ25ram13emhiY3pwdmV0cHJoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyMzk1NDMsImV4cCI6MjA5MjgxNTU0M30.WCprcmT4oFq1iPfYeQvwGyDv5Vox6YZdn5efouN_Nc0';

  async function sbFetch(path) {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
        'Content-Type': 'application/json'
      }
    });
    if (!res.ok) throw new Error(await res.text());
    return res.json();
  }


  // ── HASH ROUTER ──
  function showList() {
    document.getElementById('pageWrap').style.display = '';
    document.getElementById('doctorView').style.display = 'none';
    history.pushState('', '', window.location.pathname + window.location.search);
    document.title = 'Találatok | Szakorvos.hu';
    window.scrollTo(0,0);
  }

  async function openDoctor(id) {
    document.getElementById('pageWrap').style.display = 'none';
    document.getElementById('doctorView').style.display = 'block';
    window.scrollTo(0,0);
    history.pushState('', '', '#' + id);
    const content = document.getElementById('doctorProfileContent');
    content.innerHTML = '<div style="text-align:center;padding:4rem;color:#9aa5c4;"><svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="animation:spin 1s linear infinite;display:block;margin:0 auto 12px"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>Betöltés...</div>';
    try {
      const data = await sbFetch(`doctors?id=eq.${id}&select=id,name,title,photo_url,bio,experience_years,rating,review_count,phone,doctor_specialties(specialties(name)),doctor_clinics(consultation_fee,clinics(name,address,cities(name)))&limit=1`);
      const doc = data?.[0];
      if (!doc) { content.innerHTML = '<div style="padding:2rem;color:#e55a1c;">Az orvos nem található.</div>'; return; }
      const fullName = (doc.title ? doc.title + ' ' : '') + doc.name;
      const specs = doc.doctor_specialties?.map(d => d.specialties?.name).filter(Boolean) || [];
      const city = doc.doctor_clinics?.[0]?.clinics?.cities?.name || '';
      const address = doc.doctor_clinics?.[0]?.clinics?.address || '';
      const price = doc.doctor_clinics?.[0]?.consultation_fee;
      const rating = parseFloat(doc.rating) || 0;
      const starsStr = '★'.repeat(Math.round(rating)) + '☆'.repeat(5 - Math.round(rating));
      const photo = doc.photo_url ? `<img src="${doc.photo_url}" alt="${fullName}" style="width:100%;height:100%;object-fit:cover;border-radius:18px;">` : `<svg viewBox="0 0 24 24" fill="none" stroke="#283897" stroke-width="1.3" stroke-linecap="round" style="width:60px;height:60px;"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>`;
      document.title = fullName + ' | Szakorvos.hu';
      content.innerHTML = `
        <div style="background:linear-gradient(135deg,#1e2d7d,#3b4fc8);padding:2rem 2.5rem 2.5rem;border-radius:20px;display:flex;gap:1.5rem;align-items:flex-end;flex-wrap:wrap;margin-bottom:1.5rem;">
          <div style="width:110px;height:110px;border-radius:18px;background:rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;border:2px solid rgba(255,255,255,0.3);">${photo}</div>
          <div style="flex:1;min-width:200px;">
            <div style="display:inline-flex;align-items:center;gap:5px;background:rgba(34,197,94,0.15);color:#4ade80;font-size:11px;font-weight:700;padding:3px 10px;border-radius:100px;border:1px solid rgba(34,197,94,0.3);margin-bottom:10px;">● Elérhető időpontra</div>
            <h1 style="font-family:'Nunito',sans-serif;font-size:clamp(1.4rem,2.5vw,2rem);font-weight:900;color:#fff;margin-bottom:4px;">${fullName}</h1>
            <div style="font-size:14px;color:rgba(255,255,255,0.75);font-weight:600;margin-bottom:14px;">${specs.join(' · ') || 'Szakorvos'}</div>
            <div style="display:flex;flex-wrap:wrap;gap:14px;">
              ${city ? `<span style="font-size:12px;color:rgba(255,255,255,0.7);">📍 ${[address,city].filter(Boolean).join(', ')}</span>` : ''}
              ${doc.experience_years ? `<span style="font-size:12px;color:rgba(255,255,255,0.7);">🕐 ${doc.experience_years}+ év tapasztalat</span>` : ''}
              <span style="font-size:12px;color:#fbbf24;">★ ${rating.toFixed(1)} (${doc.review_count||0} értékelés)</span>
              ${price ? `<span style="font-size:12px;color:rgba(255,255,255,0.7);">💰 ${Number(price).toLocaleString('hu')} Ft-tól</span>` : ''}
            </div>
          </div>
          <div style="display:flex;flex-direction:column;gap:8px;flex-shrink:0;">
            <button style="background:#ff6b2b;color:#fff;font-family:'Nunito',sans-serif;font-size:14px;font-weight:800;padding:13px 24px;border-radius:12px;border:none;cursor:pointer;box-shadow:0 4px 14px rgba(255,107,43,0.4);">📅 Időpontfoglalás</button>
            ${doc.phone ? `<button style="background:rgba(255,255,255,0.12);color:#fff;font-size:13px;font-weight:600;padding:10px 18px;border-radius:10px;border:1.5px solid rgba(255,255,255,0.25);cursor:pointer;">${doc.phone}</button>` : ''}
          </div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 300px;gap:1.25rem;">
          <div style="display:flex;flex-direction:column;gap:1.25rem;">
            <div style="background:#fff;border:1.5px solid #e8edf8;border-radius:18px;padding:1.5rem;box-shadow:0 2px 10px rgba(40,56,151,0.05);">
              <div style="font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;color:#0f172a;margin-bottom:1rem;padding-bottom:0.75rem;border-bottom:1.5px solid #e8edf8;">Bemutatkozás</div>
              <p style="font-size:14px;color:#374151;line-height:1.85;">${doc.bio || 'Az orvos bemutatkozása hamarosan elérhető.'}</p>
            </div>
            ${specs.length ? `<div style="background:#fff;border:1.5px solid #e8edf8;border-radius:18px;padding:1.5rem;box-shadow:0 2px 10px rgba(40,56,151,0.05);"><div style="font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;color:#0f172a;margin-bottom:1rem;padding-bottom:0.75rem;border-bottom:1.5px solid #e8edf8;">Szakterületek</div><div style="display:flex;flex-wrap:wrap;gap:8px;">${specs.map(s=>`<span style="background:#eef2ff;color:#283897;font-size:12px;font-weight:700;padding:5px 13px;border-radius:100px;border:1px solid #c7d2f0;">${s}</span>`).join('')}</div></div>` : ''}
          </div>
          <div>
            <div style="background:#fff;border:1.5px solid #e8edf8;border-radius:18px;padding:1.5rem;box-shadow:0 2px 10px rgba(40,56,151,0.05);">
              <div style="font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;color:#0f172a;margin-bottom:1rem;padding-bottom:0.75rem;border-bottom:1.5px solid #e8edf8;">Gyors infók</div>
              <div style="display:flex;flex-direction:column;gap:12px;">
                ${city ? `<div style="display:flex;gap:10px;align-items:center;"><div style="width:34px;height:34px;background:#eef2ff;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px;">📍</div><div><div style="font-size:10px;color:#9aa5c4;font-weight:700;text-transform:uppercase;">Helyszín</div><div style="font-size:13px;font-weight:700;color:#0f172a;">${[address,city].filter(Boolean).join(', ')}</div></div></div>` : ''}
                ${price ? `<div style="display:flex;gap:10px;align-items:center;"><div style="width:34px;height:34px;background:#fff7ed;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px;">💰</div><div><div style="font-size:10px;color:#9aa5c4;font-weight:700;text-transform:uppercase;">Vizsgálat díja</div><div style="font-size:13px;font-weight:700;color:#0f172a;">${Number(price).toLocaleString('hu')} Ft-tól</div></div></div>` : ''}
                ${doc.phone ? `<div style="display:flex;gap:10px;align-items:center;"><div style="width:34px;height:34px;background:#ecfdf5;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px;">📞</div><div><div style="font-size:10px;color:#9aa5c4;font-weight:700;text-transform:uppercase;">Telefon</div><div style="font-size:13px;font-weight:700;color:#0f172a;">${doc.phone}</div></div></div>` : ''}
                <div style="display:flex;gap:10px;align-items:center;"><div style="width:34px;height:34px;background:#fef9c3;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px;">⭐</div><div><div style="font-size:10px;color:#9aa5c4;font-weight:700;text-transform:uppercase;">Értékelés</div><div style="font-size:13px;font-weight:700;color:#0f172a;">${starsStr} ${rating.toFixed(1)}/5</div></div></div>
              </div>
            </div>
          </div>
        </div>`;
    } catch(e) { content.innerHTML = `<div style="padding:2rem;color:#e55a1c;">Hiba: ${e.message}</div>`; }
  }

  window.addEventListener('hashchange', () => { const h = window.location.hash.replace('#',''); if (h) openDoctor(h); else showList(); });

  const params = new URLSearchParams(window.location.search);
  const spec = params.get('specialty') || '';
  const city = params.get('city') || '';

  if (spec) document.getElementById('searchInput').value = spec;

  const avatarColors = ['#eef2ff','#ecfdf5','#fce7f3','#fff7ed','#f0f9ff','#fdf4ff','#f0fdf4'];
  const avatarStrokes = ['#283897','#16a34a','#db2777','#ea580c','#0284c7','#9333ea','#059669'];

  function starsHtml(rating) {
    const full = Math.round(rating || 0);
    return '★'.repeat(full) + '☆'.repeat(5 - full);
  }

  function renderCard(doc, idx) {
    const specialties = doc.doctor_specialties?.map(ds => ds.specialties?.name).filter(Boolean) || [];
    const specText = specialties.slice(0, 2).join(' · ') || 'Szakorvos';
    const docCity = doc.doctor_clinics?.[0]?.clinics?.cities?.name || '';
    const rating = doc.rating || (4.5 + Math.random() * 0.4);
    const reviewCount = doc.review_count || Math.floor(Math.random() * 150 + 20);
    const price = doc.doctor_clinics?.[0]?.consultation_fee || (15000 + Math.floor(Math.random() * 4) * 5000);
    const ci = idx % avatarColors.length;

    const avatarHtml = doc.photo_url
      ? `<img src="${doc.photo_url}" alt="${doc.name}" style="width:100%;height:100%;object-fit:cover;border-radius:16px;">`
      : `<svg viewBox="0 0 24 24" fill="none" stroke="${avatarStrokes[ci]}" stroke-width="1.5" stroke-linecap="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>`;

    return `
    <div class="doctor-card" style="animation-delay:${idx * 0.06}s;cursor:pointer;" onclick="openDoctor('${doc.id}')">
      <div class="doctor-avatar" style="background:${doc.photo_url ? '#fff' : avatarColors[ci]};overflow:hidden;">
        ${avatarHtml}
      </div>
      <div class="doctor-info">
        <div class="doctor-top">
          <div>
            <div class="doctor-name">${doc.title ? doc.title + ' ' : ''}${doc.name}</div>
            <div class="doctor-spec">${specText}</div>
          </div>
          <span class="badge-available">Ma elérhető</span>
        </div>
        ${specialties.length ? `<div class="doctor-tags">${specialties.slice(0,3).map(s => `<span class="doctor-tag">${s}</span>`).join('')}</div>` : ''}
        <div class="doctor-meta">
          ${docCity ? `<div class="doctor-meta-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>${docCity}</div>` : ''}
          ${doc.experience_years ? `<div class="doctor-meta-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>${doc.experience_years} év tapasztalat</div>` : ''}
        </div>
      </div>
      <div class="doctor-right">
        <div>
          <div class="doctor-stars">${starsHtml(rating)}</div>
          <div class="doctor-rating-num">${parseFloat(rating).toFixed(1)}</div>
          <div class="doctor-reviews">${reviewCount} értékelés</div>
        </div>
        <div>
          <div class="doctor-price">${Number(price).toLocaleString('hu')} Ft</div>
          <div class="doctor-price-label">vizsgálattól</div>
        </div>
        <button class="btn-book-sm" onclick="event.stopPropagation();openDoctor('${doc.id}')">Profil megtekintése</button>
      </div>
    </div>`;
  }

  async function loadDoctors() {
    const list = document.getElementById('doctorList');
    try {
      let doctorIds = null;

      // Ha van szakterület keresés, először megkeressük a specialty ID-kat
      if (spec) {
        const specData = await sbFetch(`specialties?name=ilike.*${encodeURIComponent(spec)}*&select=id&limit=10`);
        if (specData && specData.length > 0) {
          const ids = specData.map(s => s.id).join(',');
          const dsData = await sbFetch(`doctor_specialties?specialty_id=in.(${ids})&select=doctor_id`);
          if (dsData && dsData.length > 0) {
            doctorIds = dsData.map(d => d.doctor_id);
          }
        }
      }

      // Lekérdezés összerakása
      let path = `doctors?select=id,name,title,photo_url,experience_years,rating,review_count,doctor_specialties(specialties(name)),doctor_clinics(consultation_fee,clinics(name,address,cities(name)))&is_active=eq.true&limit=20`;
      if (doctorIds && doctorIds.length > 0) {
        path += `&id=in.(${doctorIds.join(',')})`;
      } else if (spec && !doctorIds) {
        path += `&name=ilike.*${encodeURIComponent(spec)}*`;
      }

      const data = await sbFetch(path);

      document.getElementById('resultCount').textContent = data?.length || 0;

      if (!data || data.length === 0) {
        list.innerHTML = `<div style="text-align:center;padding:3rem;color:#9aa5c4;">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" style="opacity:0.4;display:block;margin:0 auto 12px"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <div style="font-size:16px;font-weight:700;color:#374151;margin-bottom:8px;">Nincs találat</div>
          <div style="font-size:14px;">Próbáljon más kulcsszóval keresni.</div>
        </div>`;
        return;
      }

      list.innerHTML = data.map((doc, i) => renderCard(doc, i)).join('');
      document.getElementById('pagination').style.display = data.length >= 10 ? 'flex' : 'none';

    } catch (e) {
      console.error(e);
      list.innerHTML = `<div style="text-align:center;padding:2rem;color:#e55a1c;font-size:14px;">Hiba a betöltés során: ${e.message}</div>`;
    }
  }

  loadDoctors();

  function doSearch() {
    const v = document.getElementById('searchInput').value.trim();
    if (v) window.location.href = 'talalatok.html?specialty=' + encodeURIComponent(v);
  }
  document.getElementById('searchInput').addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

  // ── ORVOS ADATLAP OVERLAY ──

  function closeDoctor() {
    document.getElementById('doctorOverlay').style.display = 'none';
    document.body.style.overflow = '';
  }
</script>
<style>
@keyframes spin { to { transform: rotate(360deg); } }
#doctorOverlay {
  position: fixed; inset: 0; z-index: 1000;
  background: rgba(15,23,42,0.5);
  backdrop-filter: blur(4px);
  display: none;
  align-items: flex-start;
  justify-content: center;
  padding: 2rem 1rem;
  overflow-y: auto;
}
#doctorPanel {
  background: #f4f7fb;
  border-radius: 20px;
  width: 100%;
  max-width: 900px;
  box-shadow: 0 24px 80px rgba(0,0,0,0.25);
  position: relative;
  animation: fadeUp 0.3s ease;
}
#doctorCloseBtn {
  position: absolute; top: 14px; right: 14px;
  width: 36px; height: 36px; border-radius: 50%;
  background: rgba(255,255,255,0.2); border: none; cursor: pointer;
  color: #fff; font-size: 18px; display: flex; align-items: center; justify-content: center;
  z-index: 10; transition: background 0.2s;
}
#doctorCloseBtn:hover { background: rgba(255,255,255,0.35); }
</style>

<!-- ORVOS OVERLAY -->
<div id="doctorOverlay" onclick="if(event.target===this)closeDoctor()">
  <div id="doctorPanel">
    <button id="doctorCloseBtn" onclick="closeDoctor()">✕</button>
  </div>
</div>
</body>
</html>
